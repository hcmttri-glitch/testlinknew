<script src="https://www.google.com/recaptcha/api.js?render=6LcZUjstAAAAAGdxuoYFmT5j4uVDO7NGpHgG58Kh"></script>

<script>
document.addEventListener("DOMContentLoaded", function () {

    const form = document.getElementById("verifyForm");

    // ⚠️ chống lỗi null
    if (!form) {
        console.error("Không tìm thấy form #verifyForm");
        return;
    }

    const workerUrl = "https://recaptcha-worker.hcmttri.workers.dev";

    form.addEventListener("submit", async function (e) {
        e.preventDefault();

        const honeypot = document.querySelector('input[name="website"]');

        if (honeypot && honeypot.value.trim() !== "") {
            alert("Xác minh thất bại.");
            return;
        }

        grecaptcha.ready(function () {

            grecaptcha.execute("6LcZUjstAAAAAGdxuoYFmT5j4uVDO7NGpHgG58Kh", {
                action: "submit"
            }).then(async function (token) {

                try {

                    const response = await fetch(workerUrl, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ token })
                    });

                    const result = await response.json();

                    if (result.success) {
                        window.location.href = "https://phuclong.com.vn/";
                    } else {
                        alert("Xác minh thất bại (reCAPTCHA).");
                    }

                } catch (err) {
                    console.error(err);
                    alert("Không thể kết nối server xác minh.");
                }

            });

        });

    });

});
</script>
