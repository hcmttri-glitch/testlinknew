<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác minh</title>

<style>
body{
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.box{
    background:white;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.1);
    width:320px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#007bff;
    color:white;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

/* Honeypot */
.hp{
    position:absolute;
    left:-9999px;
    opacity:0;
}
</style>
</head>

<body>

<div class="box">
<h2>Xác minh</h2>

<form id="verifyForm">

    <!-- Honeypot -->
    <input
        class="hp"
        type="text"
        name="website"
        autocomplete="off"
        tabindex="-1">

    <p>Nhấn nút bên dưới để tiếp tục.</p>

    <button type="submit">Tiếp tục</button>

</form>
</div>

<script>
document.getElementById("verifyForm").addEventListener("submit", function(e){

    e.preventDefault();

    const honeypot = document.querySelector('input[name="website"]');

    // Bot thường sẽ điền vào ô này
    if(honeypot.value.trim() !== ""){
        alert("Xác minh thất bại.");
        return;
    }

    // Người dùng bình thường
    window.location.href = "https://phuclong.com.vn/";

});
</script>

</body>
</html>
