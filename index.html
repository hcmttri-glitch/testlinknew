<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác minh</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}

.box{
    width:340px;
    background:#fff;
    padding:30px;
    border-radius:12px;
    box-shadow:0 10px 30px rgba(0,0,0,.15);
    text-align:center;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#0d6efd;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0b5ed7;
}

.hp{
    display:none;
}
</style>

<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

</head>
<body>

<div class="box">

<h2>Xác minh</h2>

<p>Vui lòng xác minh để tiếp tục.</p>

<form id="verifyForm">

<input
type="text"
name="website"
class="hp"
autocomplete="off">

<div
class="cf-turnstile"
data-sitekey="0x4AAAAAADsl4IvSpU10Ie4W">
</div>

<button type="submit">
Tiếp tục
</button>

</form>

</div>

<script>

const workerUrl="https://recaptcha-worker.hcmttri.workers.dev";

document.getElementById("verifyForm").addEventListener("submit",async function(e){

e.preventDefault();

const honeypot=document.querySelector('input[name="website"]');

if(honeypot.value!==""){
alert("Xác minh thất bại.");
return;
}

const token=document.querySelector('[name="cf-turnstile-response"]').value;

if(!token){
alert("Vui lòng hoàn thành xác minh.");
return;
}

try{

const response=await fetch(workerUrl,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
token:token
})
});

const result=await response.json();

if(result.success){

window.location.href="https://phuclong.com.vn/";

}else{

alert("Xác minh thất bại.");

}

}catch(err){

console.error(err);

alert("Không thể kết nối máy chủ.");

}

});

</script>

</body>
</html>
