<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xác minh người thật</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    background:#f5f5f5;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:340px;
    background:#fff;
    padding:25px;
    border-radius:12px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
    text-align:center;
}

#question{
    font-size:24px;
    font-weight:bold;
    margin:20px 0;
    user-select:none;
}

input[type=number]{
    width:100%;
    padding:12px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    margin-top:15px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#0066ff;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0050cc;
}

#msg{
    margin-top:15px;
    color:red;
    font-weight:bold;
}

.hp{
    display:none;
}
</style>
</head>

<body>

<div class="box">

<h2>Xác minh người thật</h2>

<div id="question"></div>

<input
id="answer"
type="number"
placeholder="Nhập đáp án">

<input
class="hp"
id="website"
type="text"
autocomplete="off">

<button onclick="checkAnswer()">
Xác nhận
</button>

<div id="msg"></div>

</div>

<script>

const startTime = Date.now();

const invisible = "\u2060";

function hideWord(word){

    const marks=[
        ".",
        "-",
        "•",
        "_",
        "~",
        ",",
        "*",
        "·"
    ];

    const mark=marks[Math.floor(Math.random()*marks.length)];

    return word.split("").join(mark+invisible);

}

let a=Math.floor(Math.random()*8)+1;
let b=Math.floor(Math.random()*8)+1;

let answer;
let text;

if(Math.random()>0.5){

    answer=a+b;

    text=a+hideWord("cộng")+b+"=";

}else{

    if(a<b){
        let t=a;
        a=b;
        b=t;
    }

    answer=a-b;

    text=a+hideWord("trừ")+b+"=";

}

document.getElementById("question").textContent=text;

function fail(){

    document.getElementById("msg").innerHTML="Sai thông tin! Đang chuyển hướng...";

    setTimeout(function(){

        location.href="https://www.highlandscoffee.com.vn/";

    },1500);

}

function checkAnswer(){

    if(document.getElementById("website").value!=""){
        fail();
        return;
    }

    if(Date.now()-startTime<2000){
        fail();
        return;
    }

    let user=Number(document.getElementById("answer").value);

    if(user===answer){

        location.href="https://phuclong.com.vn/";

    }else{

        fail();

    }

}

document.getElementById("answer").addEventListener("keydown",function(e){

    if(e.key==="Enter"){

        checkAnswer();

    }

});

</script>

</body>
</html>
