<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Xác minh</title>
<style>
body{
    font-family:Arial;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
}
.box{
    background:#fff;
    padding:25px;
    border-radius:10px;
    width:320px;
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
}
button{
    width:100%;
    padding:10px;
}
.hp{
    display:none;
}
</style>
</head>
<body>

<div class="box">

<h3>Xác minh người thật</h3>

<div id="q"></div>

<input type="number" id="ans" placeholder="Nhập đáp án">

<input type="text" id="website" class="hp">

<button onclick="check()">Xác nhận</button>

<p id="msg"></p>

</div>

<script>

const start = Date.now();

const a = Math.floor(Math.random()*5)+1;
const b = Math.floor(Math.random()*5)+1;

let answer;

if(Math.random()>0.5){

    document.getElementById("q").innerHTML =
    a + " c.ộ.n.g " + b + " =";

    answer = a+b;

}else{

    const x = Math.max(a,b);
    const y = Math.min(a,b);

    document.getElementById("q").innerHTML =
    x + " t.r.ừ " + y + " =";

    answer = x-y;

}

function check(){

    // Honeypot
    if(document.getElementById("website").value!=""){
        location.href="https://www.highlandscoffee.com.vn/";
        return;
    }

    // Trả lời quá nhanh
    if(Date.now()-start<2000){
        location.href="https://www.highlandscoffee.com.vn/";
        return;
    }

    if(Number(document.getElementById("ans").value)==answer){

        location.href="https://phuclong.com.vn/";

    }else{

        document.getElementById("msg").innerHTML="Sai thông tin";

        setTimeout(function(){

            location.href="https://www.highlandscoffee.com.vn/";

        },1000);

    }

}

</script>

</body>
</html>
